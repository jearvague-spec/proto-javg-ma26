<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Animals</title>
    <style>
        :root {
            /* Colores azul claro profesionales */
            --bg-light-blue: #e0f2fe;
            --bg-gradient: radial-gradient(circle, #bae6fd 0%, #7dd3fc 100%);
            --primary-blue: #0369a1;
            --glass-bg: rgba(255, 255, 255, 0.4);
        }

        body {
            background: var(--bg-gradient);
            background-color: var(--bg-light-blue);
            color: var(--primary-blue);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        main {
            width: 90%;
            max-width: 800px;
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            background: var(--glass-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .section1 {
            padding: 10px;
        }

        h1 { text-align: center; color: var(--primary-blue); }

        button {
            height: 100px;
            width: 100px;
            font-size: 18px; /* Ajustado para legibilidad */
            color: #1e293b;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #cbd5e1;
            cursor: pointer;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        button:hover { 
            background-color: white; 
            transform: scale(1.05);
            border-color: var(--primary-blue);
        }

        button:disabled {
            background-color: #cbd5e1;
            color: #64748b;
            cursor: default;
            border-color: transparent;
            transform: none;
        }

        .section2 {
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            width: 200px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .estadisticas {
            border: 2px solid var(--primary-blue);
            border-radius: 8px;
            padding: 10px;
            font-size: 1.4rem;
            color: var(--primary-blue);
            margin: 0;
        }

        footer { 
            margin-top: 40px; 
            text-align: center; 
            color: var(--primary-blue);
        }
        footer a { 
            color: var(--primary-blue); 
            font-weight: bold; 
            text-decoration: underline; 
        }
    </style>
</head>

<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <h1>Memory Game - Animals</h1>

    <main>
        <section class="section1">
            <table>
                <tr>
                    <td><button id="0" onclick="destapar(0)"></button></td>
                    <td><button id="1" onclick="destapar(1)"></button></td>
                    <td><button id="2" onclick="destapar(2)"></button></td>
                    <td><button id="3" onclick="destapar(3)"></button></td>
                </tr>
                <tr>
                    <td><button id="4" onclick="destapar(4)"></button></td>
                    <td><button id="5" onclick="destapar(5)"></button></td>
                    <td><button id="6" onclick="destapar(6)"></button></td>
                    <td><button id="7" onclick="destapar(7)"></button></td>
                </tr>
                <tr>
                    <td><button id="8" onclick="destapar(8)"></button></td>
                    <td><button id="9" onclick="destapar(9)"></button></td>
                    <td><button id="10" onclick="destapar(10)"></button></td>
                    <td><button id="11" onclick="destapar(11)"></button></td>
                </tr>
                <tr>
                    <td><button id="12" onclick="destapar(12)"></button></td>
                    <td><button id="13" onclick="destapar(13)"></button></td>
                    <td><button id="14" onclick="destapar(14)"></button></td>
                    <td><button id="15" onclick="destapar(15)"></button></td>
                </tr>
            </table>
        </section>

        <section class="section2">
            <h2 id="aciertos" class="estadisticas">Matches: 0</h2>
        </section>
    </main>

    <footer>
        <p>Game programmed by <a href="#">JAVG</a> | EdTech Support</p>
    </footer>

    <script>
        let tarjetasDestapadas = 0;
        let tarjeta1 = null;
        let tarjeta2 = null;
        let primerResultado = null;
        let segundoResultado = null;
        let aciertos = 0;

        let mostrarAciertos = document.getElementById('aciertos');

        let numeros = ["dog","dog","cat","cat","bee","bee","fly","fly","cow","cow","sheep","sheep","bird","bird","frog","frog"];
        numeros = numeros.sort(() => { return Math.random() - 0.5 });

        function destapar(id) {
            tarjetasDestapadas++;

            if (tarjetasDestapadas == 1) {
                tarjeta1 = document.getElementById(id);
                primerResultado = numeros[id];
                tarjeta1.innerHTML = primerResultado;
                tarjeta1.disabled = true;
            } else if (tarjetasDestapadas == 2) {
                tarjeta2 = document.getElementById(id);
                segundoResultado = numeros[id];
                tarjeta2.innerHTML = segundoResultado;
                tarjeta2.disabled = true;

                if (primerResultado == segundoResultado) {
                    tarjetasDestapadas = 0;
                    aciertos++;
                    mostrarAciertos.innerHTML = `Matches: ${aciertos}`;

                    if (aciertos == 8) {
                        mostrarAciertos.innerHTML = `Matches: ${aciertos} ⭐ Win!`;
                    }
                } else {
                    setTimeout(() => {
                        tarjeta1.innerHTML = ' ';
                        tarjeta2.innerHTML = ' ';
                        tarjeta1.disabled = false;
                        tarjeta2.disabled = false;
                        tarjetasDestapadas = 0;
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
