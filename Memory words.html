 <!-- ===== JavaScript =============================================================================== -->
 <script>
 let tarjetasDestapadas = 0;              <!-- //cuando es 1 destapa, cuando es 2 destapa / porque -->
let tarjeta1 = null;
let tarjeta2 = null;
let primerResultado = null;
let segundoResultado = null;
 <!-- /////
let aciertos = 0;

 <!-- //Apuntando a documento HTML -->
let mostrarAciertos = document.getElementById(`aciertos`);

 <!-- //Generacion de numeros aleatorios -->
let numeros = ["dog","dog","cat","cat","bee","bee","fly","fly","cow","cow","sheep","sheep","bird","bird","frog","frog"];        //16 numeros, 8 pares, 8 aciertos -->
numeros = numeros.sort(()=>{return Math.random()-0.5}); //rota los numeros de forma aleatoria -->
console.log(numeros);                                   //ubica los numeros de forma aleatoria en la consola i asigna id de consola consecutivo -->
                                                         



 <!-- //Funciones -->
 <!-- ////////////////////////////////////////////////// -->

 <!-- //Funcion main -->
 <!-- ////////////////////////////////////////////////// -->
function destapar(id)
{

 tarjetasDestapadas++;             <!-- //tarjetasDestapadas se incrementa de 1 en 1, inicialmente de 0 a 1, y luego de 1 hasta 2 para abrir el par -->
 console.log(tarjetasDestapadas);  <!-- //asigna referencia 1 para primera tarjeta o 2 para segunda tarjeta, en la ubicacion de consola donde haga clic el usuario -->
 if(tarjetasDestapadas == 1)
   { <!-- //if1
     <!-- //Mostrar primer numero
    tarjeta1 = document.getElementById(id);  <!-- //variable tarjeta1 almacena id de la ubicacion html donde el usuario hizo clic por primera vez -->
    primerResultado = numeros[id];           <!-- //variable primerResultado almacena el valor de la variable numero de la ubicacion html donde el usuario hizo clic por primera -->
    tarjeta1.innerHTML = primerResultado;    <!-- //muestra a travez de variable tarjeta1 el valor contenido en variable primerResultado -->
  
     <!-- //Deshabilitar primer boton -->
    tarjeta1.disabled = true; <!-- //deshabilita tarjeta1 -->
   } <!-- //end if1
    else
     { <!-- //else1
	  if(tarjetasDestapadas == 2)
        { <!-- //if2
          <!-- //Mostrar segundo numero
         tarjeta2 = document.getElementById(id);   <!-- //variable tarjeta2 almacena id de la ubicacion html donde el usuario hizo clic por segunda vez -->
         segundoResultado = numeros[id];           <!-- //variable primerResultado almacena el valor de la variable numero de la ubicacion html donde el usuario hizo clic por primera -->
         tarjeta2.innerHTML = segundoResultado;    <!-- //muestra a travez de variable tarjeta1 el valor contenido en variable primerResultado -->
     
          <!-- //Deshabilitar segundo boton -->
         tarjeta2.disabled = true; <!-- //deshabilita tarjeta1 -->
     
    
         if(primerResultado == segundoResultado)
           { <!-- //if3 -->
 			tarjeta1.style.backgroundColor = `rgba(252,247,94,0.9)`; //color yellow-Icterine
 			tarjeta2.style.backgroundColor = `rgba(252,247,94,0.9)`; //color yellow-Icterine
             <!-- //Encerar contador tarjetasDestapadas -->
			tarjetasDestapadas = 0;
             <!-- //Aumentar aciertos -->
            aciertos++;
            mostrarAciertos.innerHTML = `Aciertos: ${aciertos}`;
     
            if(aciertos == 8) <!-- ////////////////////////////////////////cuando se logran los 8 aciertos -->
	          { <!-- //if4
               mostrarAciertos.innerHTML = `Aciertos: ${aciertos} LISTO`;
              } <!-- //end if4 -->
     
	       } <!-- //end if3 -->
		    else
             { <!-- //else2 -->
	           <!-- //Mostrar momentaneamente valores y volver a tapar -->
              setTimeout(()=>{
	                          tarjeta1.innerHTML = ` `; 
	 		                  tarjeta2.innerHTML = ` `; 
                              tarjeta1.disabled = false;
                              tarjeta2.disabled = false;
                              tarjetasDestapadas = 0;
	                          },800); <!-- //800milisegundos, recomendacion de mejor tiempo -->
    	     
             } <!-- //end else2 -->
        } <!-- //end if2 -->
     } <!-- //end else1 -->

} <!-- //end function main -->

 </script>
