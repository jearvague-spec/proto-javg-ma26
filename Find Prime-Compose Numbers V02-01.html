<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Number or Compose Number</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            overflow-x: hidden;
            border: 3px solid #B8860B;
            animation: borderShimmer 2s ease-in-out infinite alternate;
            padding: 15px;
            padding-bottom: 50px;
            position: relative;
        }

        @keyframes borderShimmer {
            0% {
                border-color: #B8860B;
                box-shadow: 0 0 10px #B8860B;
            }
            100% {
                border-color: #FFD700;
                box-shadow: 0 0 20px #FFD700;
            }
        }

        .score-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 200;
            min-width: 100px;
            text-align: center;
        }

        .score-container .label {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .score-container .count {
            font-size: 1.5em;
        }

        .fails-container {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #FFA500, #FF8C00);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 200;
            min-width: 100px;
            text-align: center;
        }

        .fails-container .label {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .fails-container .count {
            font-size: 1.5em;
        }

        .title {
            text-align: center;
            padding: 15px;
            color: #333;
            z-index: 100;
            position: relative;
            margin-top: 50px;
        }

        .title h1 {
            font-size: 2em;
            margin-bottom: 3px;
            font-weight: 900;
        }

        .title .or {
            font-size: 1.3em;
            color: #87CEEB;
            margin: 8px 0;
            font-weight: bold;
        }

        .main-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 340px;
            position: relative;
            z-index: 50;
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 340px;
            overflow: hidden;
            border: 3px solid #5DADE2;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(93, 173, 226, 0.4);
            background: #f5f5f5;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            background: #f5f5f5;
        }

        .card-top {
            background: linear-gradient(135deg, #87CEEB, #5DADE2);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            transition: all 0.5s ease;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 10;
        }

        .card-top .number {
            font-size: 3em;
            font-weight: bold;
        }

        .card-middle {
            background: linear-gradient(135deg, #8BCC00, #4CAF50);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
            z-index: 5;
            opacity: 0;
        }

        .card-middle.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .card-middle.error {
            background: linear-gradient(135deg, #FFB366, #FFA500);
        }

        .card-middle h2 {
            font-size: 2.2em;
            margin-bottom: 12px;
        }

        .card-middle p {
            font-size: 1.1em;
            margin: 8px 0;
        }

        .card-middle .result {
            font-weight: bold;
            font-size: 1.3em;
            margin: 12px 0;
        }

        .card-middle .feedback {
            font-size: 1.4em;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
        }

        .card-bottom {
            padding: 20px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-radius: 0 0 12px 12px;
            transition: all 0.5s ease;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 10;
        }

        .btn {
            padding: 12px 25px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-prime {
            background: linear-gradient(135deg, #87CEEB, #5DADE2);
            color: white;
        }

        .btn-compose {
            background: linear-gradient(135deg, #87CEEB, #5DADE2);
            color: white;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn.selected {
            background: #FFD700 !important;
            color: #333 !important;
        }

        .card.open .card-top {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .card.open .card-bottom {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }

        .next-btn {
            margin-top: 15px;
            padding: 12px 35px;
            font-size: 1.1em;
            background: white;
            color: #4CAF50;
            border: 2px solid white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .next-btn.orange {
            background: #FF8C00 !important;
            color: white !important;
            border-color: #FF8C00 !important;
        }

        .golden-sparkle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #FFD700, #B8860B);
            border-radius: 50%;
            animation: riseAndFade 4s linear forwards;
            z-index: 1;
            pointer-events: none;
            box-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
        }

        @keyframes riseAndFade {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(80vh) scale(1);
            }
            100% {
                transform: translateY(-10vh) scale(0.5);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            animation: fall 3s linear forwards;
            z-index: 999;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .sparkles-hidden .golden-sparkle {
            display: none;
        }

        .progress-container {
            margin-top: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 30px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: bold;
            white-space: nowrap;
            border: 2px solid #FFD700;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            min-width: 140px;
            text-align: center;
        }

        .progress-container span {
            color: #FFD700;
            font-weight: bold;
        }

        .divisors-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 300;
            text-align: center;
            transition: transform 0.5s ease;
            opacity: 0;
            border: 3px solid #B8860B;
            animation: borderShimmer 2s ease-in-out infinite alternate;
            max-width: 90%;
        }

        .divisors-container.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .divisors-container .number-display {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .divisors-container h3 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .divisors-container .divisors-list {
            font-size: 1.8em;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .divisors-container .divisors-list span {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            margin: 5px;
            border-radius: 8px;
        }

        .divisors-next-btn {
            margin-top: 20px;
            padding: 15px 45px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #FFD700, #FFC700);
            color: #333;
            border: 2px solid #FFD700;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .divisors-next-btn:hover {
            background: #FFC700;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.5);
        }

        .controls-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .control-btn {
            width: 200px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .restart-btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(56, 239, 125, 0.4);
        }

        .close-btn {
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(108, 117, 125, 0.4);
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 0.8em;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            padding: 8px 20px;
            border-radius: 20px;
            line-height: 1.4;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .footer p {
            margin: 2px 0;
        }

        @media (max-width: 400px) {
            .main-container {
                width: 300px;
            }
            .card-container {
                height: 300px;
            }
            .title h1 {
                font-size: 1.5em;
            }
            .control-btn {
                width: 180px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="score-container">
        <div class="label">OK</div>
        <div class="count" id="scoreCount">0</div>
    </div>

    <div class="fails-container">
        <div class="label">Fails</div>
        <div class="count" id="failsCount">0</div>
    </div>

    <div class="title">
        <h1>Prime</h1>
        <h1>Number</h1>
        <p class="or">or</p>
        <h1>Compose</h1>
        <h1>Number</h1>
    </div>

    <div class="main-container">
        <div class="card-container">
            <div class="card" id="card">
                <div class="card-top" id="cardTop">
                    <div class="number" id="number">50</div>
                </div>
                
                <div class="card-middle" id="cardMiddle">
                    <h2 id="messageNumber">50</h2>
                    <p id="messageIs">is a</p>
                    <p class="result" id="messageResult">Prime number</p>
                    <p class="feedback" id="messageFeedback">Good Job!</p>
                    <button class="next-btn" id="nextBtn" onclick="showDivisors()">Next</button>
                </div>
                
                <div class="card-bottom" id="cardBottom">
                    <button class="btn btn-prime" id="btnPrime" onclick="selectOption('prime')">Prime</button>
                    <button class="btn btn-compose" id="btnCompose" onclick="selectOption('compose')">Compose</button>
                </div>
            </div>
        </div>

        <div class="progress-container" id="progressContainer">
            Number: <span id="currentNum">1</span> / 99
        </div>

        <div class="controls-container">
            <button class="control-btn restart-btn" onclick="restartGame()">Restart</button>
            <button class="control-btn close-btn" onclick="closeApp()">Close</button>
            
            <div class="footer">
                <p>Developed by JesusA VasquezG</p>
                <p>Copyright 22mar26</p>
            </div>
        </div>
    </div>

    <div class="divisors-container" id="divisorsContainer">
        <div class="number-display" id="divisorNumber">33</div>
        <h3>Divide by:</h3>
        <div class="divisors-list" id="divisorsList">
            <span>1</span>, <span>3</span>, <span>11</span>, <span>33</span>
        </div>
        <button class="divisors-next-btn" id="divisorsNextBtn" onclick="nextRound()">Next</button>
    </div>

    <script>
        let currentNumber = 0;
        let selectedOption = null;
        let isProcessing = false;
        let sparkleInterval = null;
        let score = 0;
        let fails = 0;
        let numberIndex = 0;
        let numbersArray = [];

        function saveGame() {
            const gameState = {
                score: score,
                fails: fails,
                numberIndex: numberIndex,
                numbersArray: numbersArray
            };
            localStorage.setItem('primeGameSave', JSON.stringify(gameState));
        }

        function loadGame() {
            const savedData = localStorage.getItem('primeGameSave');
            if (savedData) {
                const gameState = JSON.parse(savedData);
                score = gameState.score;
                fails = gameState.fails;
                numberIndex = gameState.numberIndex;
                numbersArray = gameState.numbersArray;
                updateScore();
                generateNumber();
                return true;
            }
            return false;
        }

        // RESTART - Asks if user wants to restart
        function restartGame() {
            const wantToRestart = confirm("Are you sure you want to restart?");
            if (wantToRestart) {
                localStorage.removeItem('primeGameSave');
                score = 0;
                fails = 0;
                numberIndex = 0;
                initializeNumbers();
                updateScore();
                generateNumber();
                document.getElementById('cardMiddle').classList.remove('show');
                document.getElementById('card').classList.remove('open');
                document.getElementById('btnPrime').disabled = false;
                document.getElementById('btnCompose').disabled = false;
                document.getElementById('btnPrime').classList.remove('selected');
                document.getElementById('btnCompose').classList.remove('selected');
                isProcessing = false;
            }
        }

        // CLOSE - Simply asks "Do you want to save?"
        function closeApp() {
            const hasProgress = score > 0 || fails > 0 || numberIndex > 0;
            
            if (hasProgress) {
                const wantToSave = confirm("Do you want to save?");
                if (wantToSave) {
                    saveGame();
                    alert("Game Saved! You can close the tab now.");
                }
            }
            
            // Clear saved data and close
            localStorage.removeItem('primeGameSave');
            // Try to close the window
            window.close();
            // Fallback for browsers that block window.close()
            document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;"><h1>Goodbye! 👋</h1><p>You can close this tab now.</p></div>';
        }

        function initializeNumbers() {
            numbersArray = [];
            for (let i = 2; i <= 100; i++) {
                numbersArray.push(i);
            }
            shuffleArray(numbersArray);
            numberIndex = 0;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function isPrime(num) {
            if (num < 2) return false;
            if (num === 2 || num === 3) return true;
            if (num % 2 === 0 || num % 3 === 0) return false;
            
            for (let i = 5; i * i <= num; i += 6) {
                if (num % i === 0 || num % (i + 2) === 0) return false;
            }
            return true;
        }

        function getDivisors(num) {
            const divisors = [];
            for (let i = 1; i <= num; i++) {
                if (num % i === 0) {
                    divisors.push(i);
                }
            }
            return divisors;
        }

        function generateNumber() {
            if (numberIndex >= numbersArray.length) {
                shuffleArray(numbersArray);
                numberIndex = 0;
            }
            currentNumber = numbersArray[numberIndex];
            document.getElementById('number').textContent = currentNumber;
            document.getElementById('currentNum').textContent = numberIndex + 1;
        }

        function updateScore() {
            document.getElementById('scoreCount').textContent = score;
            document.getElementById('failsCount').textContent = fails;
        }

        function createGoldenSparkles() {
            if (sparkleInterval) clearInterval(sparkleInterval);

            sparkleInterval = setInterval(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'golden-sparkle';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.animationDuration = (Math.random() * 2 + 3) + 's';
                sparkle.style.width = (Math.random() * 4 + 4) + 'px';
                sparkle.style.height = sparkle.style.width;
                
                const goldColors = ['#FFD700', '#FFC700', '#B8860B', '#DAA520', '#F0E68C'];
                sparkle.style.background = `radial-gradient(circle, ${goldColors[Math.floor(Math.random() * goldColors.length)]}, #B8860B)`;
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, 5000);
            }, 300);
        }

        function stopGoldenSparkles() {
            if (sparkleInterval) {
                clearInterval(sparkleInterval);
                sparkleInterval = null;
            }
            document.body.classList.add('sparkles-hidden');
            const existingSparkles = document.querySelectorAll('.golden-sparkle');
            existingSparkles.forEach(sparkle => sparkle.remove());
        }

        function startGoldenSparkles() {
            document.body.classList.remove('sparkles-hidden');
            createGoldenSparkles();
        }

        function selectOption(option) {
            if (isProcessing) return;
            isProcessing = true;
            selectedOption = option;
            
            document.getElementById('btnPrime').disabled = true;
            document.getElementById('btnCompose').disabled = true;
            
            if (option === 'prime') {
                document.getElementById('btnPrime').classList.add('selected');
            } else {
                document.getElementById('btnCompose').classList.add('selected');
            }
            
            setTimeout(() => { showResult(); }, 2000);
        }

        function showResult() {
            const isActuallyPrime = isPrime(currentNumber);
            const isCorrect = (selectedOption === 'prime' && isActuallyPrime) || 
                             (selectedOption === 'compose' && !isActuallyPrime);
            
            const cardMiddle = document.getElementById('cardMiddle');
            const nextBtn = document.getElementById('nextBtn');
            const messageNumber = document.getElementById('messageNumber');
            const messageIs = document.getElementById('messageIs');
            const messageResult = document.getElementById('messageResult');
            const messageFeedback = document.getElementById('messageFeedback');
            
            messageNumber.textContent = currentNumber;
            
            if (isCorrect) {
                messageIs.textContent = 'is a';
                messageResult.textContent = selectedOption === 'prime' ? 'Prime number' : 'Compose number';
                messageFeedback.textContent = 'Good Job!';
                cardMiddle.classList.remove('error');
                nextBtn.classList.remove('orange');
                score++;
                updateScore();
                createConfetti();
            } else {
                messageIs.textContent = 'is not a';
                messageResult.textContent = selectedOption === 'prime' ? 'Prime number' : 'Compose number';
                messageFeedback.textContent = 'Try next time!';
                cardMiddle.classList.add('error');
                nextBtn.classList.add('orange');
                fails++;
                updateScore();
            }
            
            document.getElementById('card').classList.add('open');
            cardMiddle.classList.add('show');
        }

        function showDivisors() {
            const divisorsContainer = document.getElementById('divisorsContainer');
            const divisorNumber = document.getElementById('divisorNumber');
            const divisorsList = document.getElementById('divisorsList');
            
            const divisors = getDivisors(currentNumber);
            
            divisorNumber.textContent = currentNumber;
            
            let divisorsHTML = '';
            divisors.forEach((div, index) => {
                if (index > 0) divisorsHTML += ', ';
                divisorsHTML += `<span>${div}</span>`;
            });
            divisorsList.innerHTML = divisorsHTML;
            
            divisorsContainer.classList.add('show');
        }

        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff69b4', '#FFD700'];
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.width = (Math.random() * 8 + 6) + 'px';
                    confetti.style.height = confetti.style.width;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 20);
            }
        }

        function nextRound() {
            document.getElementById('divisorsContainer').classList.remove('show');
            document.getElementById('cardMiddle').classList.remove('show');
            document.getElementById('cardMiddle').classList.remove('error');
            document.getElementById('card').classList.remove('open');
            document.getElementById('btnPrime').disabled = false;
            document.getElementById('btnCompose').disabled = false;
            document.getElementById('btnPrime').classList.remove('selected');
            document.getElementById('btnCompose').classList.remove('selected');
            document.getElementById('nextBtn').classList.remove('orange');
            
            selectedOption = null;
            isProcessing = false;
            
            numberIndex++;
            generateNumber();
            startGoldenSparkles();
        }

        if (!loadGame()) {
            initializeNumbers();
            generateNumber();
        }
        
        startGoldenSparkles();
        updateScore();

    </script>
</body>
</html>
