<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shape Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- Background --- */
        .sun {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 40px #ff8c00;
            animation: pulseSun 4s infinite alternate;
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            opacity: 0.9;
            animation: floatCloud linear infinite;
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .c1 { width: 100px; height: 40px; top: 10%; left: -100px; animation-duration: 25s; }
        .c1::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c1::before { width: 40px; height: 40px; top: -15px; left: 45px; }
        
        .c2 { width: 140px; height: 60px; top: 20%; left: -200px; animation-duration: 35s; animation-delay: 5s; }
        .c2::after { width: 70px; height: 70px; top: -35px; left: 20px; }
        .c2::before { width: 60px; height: 60px; top: -25px; left: 60px; }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25%;
            background: linear-gradient(to top, #56ab2f, #a8e063);
            border-top-left-radius: 50% 20%;
            border-top-right-radius: 50% 20%;
            z-index: 1;
        }

        /* --- Game Card --- */
        #app-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 600px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), inset 0 0 0 5px rgba(255,255,255,0.5);
            text-align: center;
            padding: 25px;
            position: relative;
            z-index: 10;
            border: 4px solid #fff;
        }

        /* --- AI Character --- */
        .ai-character {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e0e0e0);
            border-radius: 50%;
            margin: 0 auto 15px;
            position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid #fff;
            animation: bounce 2s infinite ease-in-out;
        }

        .ai-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
        }

        .ai-eye {
            width: 24px;
            height: 24px;
            background: #2d3436;
            border-radius: 50%;
            position: absolute;
            top: 25px;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.5);
            animation: blink 3s infinite;
        }
        .ai-eye.left { left: 15px; }
        .ai-eye.right { right: 15px; }
        
        .ai-pupil {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        .ai-mouth {
            width: 40px;
            height: 20px;
            background: #ff7675;
            border-radius: 0 0 20px 20px;
            position: absolute;
            bottom: 15px;
            left: 20px;
            transition: 0.3s;
        }

        h1 { color: #2d3436; font-size: 2rem; margin: 0 0 5px 0; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        p.instruction { color: #636e72; font-size: 1.4rem; margin: 0 0 10px 0; font-weight: 600; min-height: 1.5em; }
        
        .edu-message {
            font-size: 1.8rem;
            color: #6c5ce7;
            font-weight: 700;
            height: 2.5rem;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .edu-message.show {
            opacity: 1;
            transform: scale(1);
        }

        /* --- Game Area --- */
        .game-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 220px;
            perspective: 1000px;
            position: relative;
        }

        /* --- 3D Gummy Shapes (No Drop Shine) --- */
        .shape-btn {
            width: 140px;
            height: 140px;
            border: none;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            -webkit-tap-highlight-color: transparent;
            /* Soft gradient only, no white drop */
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), rgba(255,255,255,0.05)); 
        }

        .shape-btn:hover {
            transform: scale(1.15) translateY(-10px);
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.3));
            z-index: 5;
        }

        .shape-btn:active { transform: scale(0.95); }

        /* Removed the ::after drop effect */
        .shape-btn::after { display: none; }

        /* Colors */
        .gummy-red { background: radial-gradient(circle at 30% 30%, #ff8a8a, #d63031); }
        .gummy-blue { background: radial-gradient(circle at 30% 30%, #74ebd5, #00b894); }
        .gummy-yellow { background: radial-gradient(circle at 30% 30%, #ffeaa7, #fdcb6e); }
        .gummy-purple { background: radial-gradient(circle at 30% 30%, #a29bfe, #6c5ce7); }
        .gummy-orange { background: radial-gradient(circle at 30% 30%, #fab1a0, #e17055); }
        .gummy-pink { background: radial-gradient(circle at 30% 30%, #fd79a8, #e84393); }
        .gummy-green { background: radial-gradient(circle at 30% 30%, #55efc4, #00b894); }
        .gummy-teal { background: radial-gradient(circle at 30% 30%, #81ecec, #00cec9); }

        /* --- PRECISE SHAPES --- */
        .shape-circle { border-radius: 50%; }
        
        /* Complete Triangle using Clip Path */
        .shape-triangle {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle at 30% 30%, #ffeaa7, #fdcb6e);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            border-radius: 0;
        }

        .shape-square {
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
            border-radius: 0 !important;
        }
        
        .shape-rectangle {
            width: 160px; height: 100px;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
            border-radius: 0 !important;
        }

        /* Precise Rhombus (Equal Sides) */
        .shape-rhombus { 
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); 
            border-radius: 0; 
        }
        
        /* Second Rhombus Variation (Wider) */
        .shape-rhombus-wide {
            width: 160px;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            border-radius: 0;
        }

        .shape-parallelogram { clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%); border-radius: 0; }
        .shape-trapezoid { clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); border-radius: 0; }
        .shape-isosceles-trapezoid { clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%); border-radius: 0; }

        /* Precise Hexagon (Equal Sides) */
        .shape-hexagon { 
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); 
            border-radius: 0; 
        }
        
        /* Precise Nonagon (9 sides) */
        .shape-nonagon { 
            clip-path: polygon(50% 0%, 82% 14%, 98% 41%, 93% 73%, 67% 96%, 33% 96%, 7% 73%, 2% 41%, 18% 14%); 
            border-radius: 0; 
        }

        .shape-heptagon { clip-path: polygon(50% 0%, 85% 15%, 100% 50%, 85% 85%, 50% 100%, 15% 85%, 0% 50%); border-radius: 0; }
        .shape-octagon { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); border-radius: 0; }
        .shape-decagon { clip-path: polygon(38% 0%, 62% 0%, 90% 20%, 100% 50%, 90% 80%, 62% 100%, 38% 100%, 10% 80%, 0% 50%, 10% 20%); border-radius: 0; }
        .shape-hendecagon { clip-path: polygon(50% 0%, 78% 10%, 95% 35%, 95% 65%, 78% 90%, 50% 100%, 22% 90%, 5% 65%, 5% 35%, 22% 10%); border-radius: 0; }
        .shape-dodecagon { clip-path: polygon(35% 0%, 65% 0%, 85% 15%, 100% 35%, 100% 65%, 85% 85%, 65% 100%, 35% 100%, 15% 85%, 0% 65%, 0% 35%, 15% 15%); border-radius: 0; }

        .shape-oval {
            width: 160px;
            height: 100px;
            border-radius: 50%;
        }
        .shape-ellipse {
            width: 170px;
            height: 90px;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* --- Animations --- */
        .disappear {
            opacity: 0;
            transform: scale(0) rotate(180deg);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none;
        }

        .move-to-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1.8);
            z-index: 100;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes spinH {
            0% { transform: translate(-50%, -50%) scale(1.8) rotateY(0deg); }
            100% { transform: translate(-50%, -50%) scale(1.8) rotateY(360deg); }
        }
        @keyframes spinV {
            0% { transform: translate(-50%, -50%) scale(1.8) rotateX(0deg); }
            100% { transform: translate(-50%, -50%) scale(1.8) rotateX(360deg); }
        }

        .anim-h { animation: spinH 1.5s ease-in-out forwards; }
        .anim-v { animation: spinV 1.5s ease-in-out forwards; }

        .confetti {
            position: absolute;
            width: 12px; height: 12px;
            border-radius: 2px;
            z-index: 200;
        }

        @keyframes fallTop { to { transform: translateY(100vh) rotate(720deg); } }
        @keyframes explodeCenter { 
            0% { transform: translate(-50vw, -50vh) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1) rotate(720deg); opacity: 0; }
        }
        @keyframes slideRight { from { left: 100%; transform: rotate(45deg); } to { left: 0; transform: rotate(765deg); } }
        @keyframes slideLeft { from { left: -10%; transform: rotate(-45deg); } to { left: 100%; transform: rotate(-765deg); } }
        @keyframes riseBottom { from { top: 100%; transform: rotate(180deg); } to { top: -10%; transform: rotate(-540deg); } }
        @keyframes meltRemove { 
            0% { transform: scaleY(1); opacity: 1; }
            100% { transform: scaleY(0.1) translateY(20px); opacity: 0; }
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes floatCloud { from { left: -200px; } to { left: 100%; } }
        @keyframes pulseSun { from { transform: scale(1); } to { transform: scale(1.1); } }

        .progress-container {
            width: 100%;
            background: #dfe6e9;
            height: 15px;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
            border: 2px solid #fff;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fd79a8, #6c5ce7);
            width: 0%;
            transition: width 0.5s;
            border-radius: 10px;
        }

    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="grass"></div>

    <div id="app-container">
        <div class="ai-character">
            <div class="ai-face">
                <div class="ai-eye left"><div class="ai-pupil"></div></div>
                <div class="ai-eye right"><div class="ai-pupil"></div></div>
                <div class="ai-mouth"></div>
            </div>
        </div>

        <h1 id="level-title">Level 1</h1>
        <p class="instruction" id="instruction-text">Loading...</p>
        
        <div class="edu-message" id="edu-message"></div>

        <div class="game-area" id="shapes-container"></div>

        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
    </div>

<script>
    // Updated Shape Library: Kite removed, added extra Rhombus. Triangle fixed.
    const shapesData = [
        { type: 'circle', name: 'Circle', class: 'shape-circle gummy-red', sides: 0, vertices: 0 },
        { type: 'triangle', name: 'Triangle', class: 'shape-triangle gummy-yellow', sides: 3, vertices: 3 },
        
        // 4 Sided
        { type: 'square', name: 'Square', class: 'shape-square gummy-blue', sides: 4, vertices: 4 },
        { type: 'rectangle', name: 'Rectangle', class: 'shape-rectangle gummy-green', sides: 4, vertices: 4 },
        { type: 'rhombus', name: 'Rhombus', class: 'shape-rhombus gummy-purple', sides: 4, vertices: 4 },
        { type: 'rhombus-wide', name: 'Rhombus', class: 'shape-rhombus-wide gummy-pink', sides: 4, vertices: 4 }, // Replaced Kite
        { type: 'parallelogram', name: 'Parallelogram', class: 'shape-parallelogram gummy-orange', sides: 4, vertices: 4 },
        { type: 'trapezoid', name: 'Trapezoid', class: 'shape-trapezoid gummy-red', sides: 4, vertices: 4 },
        { type: 'isosceles-trapezoid', name: 'Isosceles Trapezoid', class: 'shape-isosceles-trapezoid gummy-blue', sides: 4, vertices: 4 },
        
        // Polygons
        { type: 'pentagon', name: 'Pentagon', class: 'poly-shape gummy-yellow', sides: 5, vertices: 5, clip: 'polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)' },
        { type: 'hexagon', name: 'Hexagon', class: 'poly-shape gummy-green', sides: 6, vertices: 6, clip: 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)' },
        { type: 'heptagon', name: 'Heptagon', class: 'poly-shape gummy-purple', sides: 7, vertices: 7, clip: 'polygon(50% 0%, 85% 15%, 100% 50%, 85% 85%, 50% 100%, 15% 85%, 0% 50%)' },
        { type: 'octagon', name: 'Octagon', class: 'poly-shape gummy-orange', sides: 8, vertices: 8, clip: 'polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%)' },
        { type: 'nonagon', name: 'Nonagon', class: 'poly-shape gummy-pink', sides: 9, vertices: 9, clip: 'polygon(50% 0%, 82% 14%, 98% 41%, 93% 73%, 67% 96%, 33% 96%, 7% 73%, 2% 41%, 18% 14%)' },
        { type: 'decagon', name: 'Decagon', class: 'poly-shape gummy-red', sides: 10, vertices: 10, clip: 'polygon(38% 0%, 62% 0%, 90% 20%, 100% 50%, 90% 80%, 62% 100%, 38% 100%, 10% 80%, 0% 50%, 10% 20%)' },
        { type: 'hendecagon', name: 'Hendecagon', class: 'poly-shape gummy-blue', sides: 11, vertices: 11, clip: 'polygon(50% 0%, 78% 10%, 95% 35%, 95% 65%, 78% 90%, 50% 100%, 22% 90%, 5% 65%, 5% 35%, 22% 10%)' },
        { type: 'dodecagon', name: 'Dodecagon', class: 'poly-shape gummy-yellow', sides: 12, vertices: 12, clip: 'polygon(35% 0%, 65% 0%, 85% 15%, 100% 35%, 100% 65%, 85% 85%, 65% 100%, 35% 100%, 15% 85%, 0% 65%, 0% 35%, 15% 15%)' },

        // Curved
        { type: 'oval', name: 'Oval', class: 'shape-oval gummy-teal', sides: 1, vertices: 0 },
        { type: 'ellipse', name: 'Ellipse', class: 'shape-ellipse gummy-green', sides: 1, vertices: 0 }
    ];

    let currentLevel = 0;
    const totalLevels = 12;
    let isProcessing = false;

    const instructionText = document.getElementById('instruction-text');
    const eduMessage = document.getElementById('edu-message');
    const shapesContainer = document.getElementById('shapes-container');
    const levelTitle = document.getElementById('level-title');
    const progressFill = document.getElementById('progress');
    const mouth = document.querySelector('.ai-mouth');

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initGame() {
        loadLevel();
    }

    function loadLevel() {
        if (currentLevel >= totalLevels) {
            gameWin();
            return;
        }

        isProcessing = false;
        levelTitle.innerText = `Level ${currentLevel + 1}`;
        shapesContainer.innerHTML = '';
        eduMessage.className = 'edu-message';
        eduMessage.innerText = '';
        progressFill.style.width = `${(currentLevel / totalLevels) * 100}%`;

        const targetShape = shapesData[Math.floor(Math.random() * shapesData.length)];
        let distractorShape;
        do {
            distractorShape = shapesData[Math.floor(Math.random() * shapesData.length)];
        } while (distractorShape.type === targetShape.type);

        let options = shuffle([targetShape, distractorShape]);

        typeWriter(`Find the ${targetShape.name}!`, 0);

        options.forEach(shape => {
            const btn = document.createElement('button');
            btn.className = `shape-btn ${shape.class}`;
            btn.dataset.type = shape.type;
            
            if (shape.clip) {
                btn.style.clipPath = shape.clip;
            }

            btn.onclick = (e) => checkAnswer(shape, targetShape, e.target);
            shapesContainer.appendChild(btn);
        });
    }

    function typeWriter(text, i) {
        if (i < text.length) {
            instructionText.innerHTML = text.substring(0, i+1);
            setTimeout(() => typeWriter(text, i + 1), 40);
        } else {
            mouth.style.height = "20px";
            setTimeout(() => mouth.style.height = "15px", 100);
        }
    }

    function checkAnswer(selected, target, btnElement) {
        if (isProcessing) return;

        if (selected.type === target.type) {
            isProcessing = true;
            mouth.style.borderRadius = "50%";
            mouth.style.height = "25px";
            mouth.style.background = "#ff7675";

            instructionText.innerText = "Super Job! 🌟";
            instructionText.style.color = "#00b894";

            const allBtns = document.querySelectorAll('.shape-btn');
            let correctBtn = null;

            allBtns.forEach(b => {
                if (b.dataset.type === target.type) correctBtn = b;
                else b.classList.add('disappear');
            });

            if (correctBtn) {
                setTimeout(() => {
                    correctBtn.classList.add('move-to-center');
                    setTimeout(() => {
                        correctBtn.classList.add('anim-h');
                        setTimeout(() => {
                            correctBtn.classList.remove('anim-h');
                            correctBtn.classList.add('anim-v');
                            setTimeout(() => {
                                correctBtn.classList.remove('anim-v');
                                const effectType = currentLevel % 6;
                                triggerConfetti(effectType);
                                setTimeout(() => {
                                    showEduMessages(target);
                                }, 2000);
                            }, 1500);
                        }, 1500);
                    }, 2000);
                }, 100);
            }
        } else {
            instructionText.innerText = "Oops! Try again.";
            instructionText.style.color = "#d63031";
            btnElement.style.transform = "translateX(10px)";
            setTimeout(() => btnElement.style.transform = "translateX(-10px)", 100);
            setTimeout(() => btnElement.style.transform = "", 200);
        }
    }

    function showEduMessages(shape) {
        let sideText = shape.sides === 1 ? "1 Side (Curved)" : (shape.sides === 0 ? "0 Sides" : `${shape.sides} Sides`);
        eduMessage.innerText = sideText;
        eduMessage.classList.add('show');

        setTimeout(() => {
            eduMessage.classList.remove('show');
            setTimeout(() => {
                let vertText = shape.vertices === 1 ? "1 Vertex?" : (shape.vertices === 0 ? "0 Vertices" : `${shape.vertices} Vertices`);
                eduMessage.innerText = vertText;
                eduMessage.classList.add('show');

                setTimeout(() => {
                    eduMessage.classList.remove('show');
                    setTimeout(() => {
                        currentLevel++;
                        mouth.style.borderRadius = "0 0 20px 20px";
                        mouth.style.height = "15px";
                        instructionText.style.color = "#636e72";
                        loadLevel();
                    }, 1000);
                }, 2000);
            }, 500);
        }, 2000);
    }

    function triggerConfetti(type) {
        const colors = ['#ff7675', '#55efc4', '#74b9ff', '#ffeaa7', '#a29bfe'];
        const count = 80;

        for (let i = 0; i < count; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 8 + 6;
            conf.style.width = `${size}px`;
            conf.style.height = `${size}px`;

            if (type === 0) { 
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = -10 + 'px';
                conf.style.animation = `fallTop ${Math.random() * 2 + 2}s linear forwards`;
            } else if (type === 1) {
                conf.style.left = '50%';
                conf.style.top = '50%';
                const tx = (Math.random() - 0.5) * 100 + 'vw';
                const ty = (Math.random() - 0.5) * 100 + 'vh';
                conf.style.setProperty('--tx', tx);
                conf.style.setProperty('--ty', ty);
                conf.style.animation = `explodeCenter ${Math.random() * 1 + 1}s ease-out forwards`;
            } else if (type === 2) {
                conf.style.top = Math.random() * 100 + 'vh';
                conf.style.left = '100%';
                conf.style.animation = `slideRight ${Math.random() * 2 + 2}s linear forwards`;
            } else if (type === 3) {
                conf.style.top = Math.random() * 100 + 'vh';
                conf.style.left = '-10%';
                conf.style.animation = `slideLeft ${Math.random() * 2 + 2}s linear forwards`;
            } else if (type === 4) {
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '100%';
                conf.style.animation = `riseBottom ${Math.random() * 2 + 2}s linear forwards`;
            } else if (type === 5) {
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = -10 + 'px';
                conf.style.animation = `meltRemove ${Math.random() * 2 + 2}s ease-in forwards`;
            }

            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 4000);
        }
    }

    function gameWin() {
        levelTitle.innerText = "YOU WON! 🏆";
        instructionText.innerText = "You are a Shape Master!";
        shapesContainer.innerHTML = '<div style="font-size: 5rem; animation: bounce 1s infinite;">🎉🚀🎈</div>';
        progressFill.style.width = '100%';
        triggerConfetti(1);
        triggerConfetti(0);
    }

    initGame();

</script>
</body>
</html>
