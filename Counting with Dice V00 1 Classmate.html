<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Dice - Math Challenge</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dot-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
        }

        .player-section { 
            width: 100%; max-width: 380px; text-align: center; margin-bottom: 20px; 
        }

        .matrix-container {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            background: white; padding: 15px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 4px solid var(--primary);
        }

        .cell {
            aspect-ratio: 1; background: #f8fafc; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 1.3rem;
            border: 1px solid #e2e8f0;
        }
        .cell.selected { background: var(--primary); color: white; }
        .cell.correct { background: var(--success) !important; color: white; cursor: default; }
        .cell.error { background: var(--danger) !important; color: white; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .game-controls {
            background: white; padding: 20px; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
            margin-bottom: 20px; width: 100%; max-width: 380px; box-sizing: border-box;
        }

        .dice-area { 
            display: flex; 
            gap: 25px; 
            justify-content: center; 
            margin: 15px 0;
        }

        .die {
            width: 75px; height: 75px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e2e8f0);
            border-radius: 15px; display: grid; grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr); padding: 10px; gap: 5px;
            border: 1px solid #cbd5e1; box-shadow: 0 5px 0 #94a3b8;
        }

        .rolling { animation: wobble 0.1s infinite; }
        @keyframes wobble { 0% { transform: rotate(2deg); } 100% { transform: rotate(-2deg); } }

        .dot { width: 14px; height: 14px; background: var(--dot-color); border-radius: 50%; opacity: 0; }
        
        .d-1 .dot:nth-child(5) { opacity: 1; }
        .d-2 .dot:nth-child(1), .d-2 .dot:nth-child(9) { opacity: 1; }
        .d-3 .dot:nth-child(1), .d-3 .dot:nth-child(5), .d-3 .dot:nth-child(9) { opacity: 1; }
        .d-4 .dot:nth-child(1), .d-4 .dot:nth-child(3), .d-4 .dot:nth-child(7), .d-4 .dot:nth-child(9) { opacity: 1; }
        .d-5 .dot:nth-child(1), .d-5 .dot:nth-child(3), .d-5 .dot:nth-child(5), .d-5 .dot:nth-child(7), .d-5 .dot:nth-child(9) { opacity: 1; }
        .d-6 .dot:nth-child(1), .d-6 .dot:nth-child(4), .d-6 .dot:nth-child(7), .d-6 .dot:nth-child(3), .d-6 .dot:nth-child(6), .d-6 .dot:nth-child(9) { opacity: 1; }

        #actionBtn {
            width: 100%; padding: 16px; border: none; border-radius: 50px;
            background: var(--primary); color: white; font-weight: 900; 
            cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        #actionBtn.stop { background: var(--danger); }
        #actionBtn.passed { background: var(--warning); color: #000; animation: pulse 1s infinite; }
        #actionBtn:disabled:not(.passed) { opacity: 0.5; cursor: default; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        #statusLabel { font-weight: bold; color: #64748b; margin-bottom: 10px; font-size: 0.9rem; min-height: 1.2em; }
        #restartBtn {
            margin-top: 15px; padding: 12px 24px; background: var(--success);
            color: white; border: none; border-radius: 50px; font-weight: 600;
            cursor: pointer; display: none;
        }
        #restartBtn:hover { opacity: 0.9; }

        .footer {
            margin-top: 30px;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="player-section">
        <h2>Counting Dice</h2>
        <div class="matrix-container" id="m1"></div>
    </div>

    <div class="game-controls">
        <div id="statusLabel">Press the button to roll!</div>
        <div class="dice-area">
            <!-- Die 1 -->
            <div class="die d-1" id="die1">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <!-- Die 2 -->
            <div class="die d-1" id="die2">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
        <button id="actionBtn">ROLL THE DICE</button>
        <button id="restartBtn">🔄 NEW GAME</button>
    </div>

    <div class="footer">developed by javg-jedovara</div>

    <script>
        let isRolling = false;
        let canPassManually = false;
        let rollInterval;
        let targetSum = 0;
        let selectedVals = [];
        let gameWon = false;

        const btn = document.getElementById('actionBtn');
        const restartBtn = document.getElementById('restartBtn');
        const label = document.getElementById('statusLabel');

        function createCells(id) {
            const m = document.getElementById(id);
            for(let i=1; i<=10; i++) {
                const c = document.createElement('div');
                c.className = 'cell';
                c.textContent = i;
                c.onclick = () => selectCell(c, i);
                m.appendChild(c);
            }
        }
        createCells('m1');

        btn.onclick = () => {
            if (gameWon) return;
            if (canPassManually) {
                resetTurn();
                return;
            }
            if (isRolling) stopDice();
            else startDice();
        };

        restartBtn.onclick = () => {
            location.reload();
        };

        function startDice() {
            isRolling = true;
            canPassManually = false;
            btn.textContent = "STOP";
            btn.classList.add('stop');
            label.textContent = "Rolling...";
            rollInterval = setInterval(() => {
                document.getElementById('die1').className = `die rolling d-${Math.floor(Math.random()*6)+1}`;
                document.getElementById('die2').className = `die rolling d-${Math.floor(Math.random()*6)+1}`;
            }, 60);
        }

        function stopDice() {
            clearInterval(rollInterval);
            isRolling = false;
            btn.classList.remove('stop');
            
            const v1 = Math.floor(Math.random()*6)+1;
            const v2 = Math.floor(Math.random()*6)+1;
            
            document.getElementById('die1').className = `die d-${v1}`;
            document.getElementById('die2').className = `die d-${v2}`;
            
            targetSum = v1 + v2;
            label.textContent = "Target Sum: " + targetSum;
            btn.disabled = true;
            btn.textContent = "SELECT NUMBERS";
            // ... resto de tu lógica de juego aquí
        }

        function resetTurn() {
            canPassManually = false;
            btn.classList.remove('passed');
            btn.textContent = "ROLL THE DICE";
            label.textContent = "Next turn!";
            // ... lógica para limpiar selección aquí
        }
    </script>
</body>
</html>
